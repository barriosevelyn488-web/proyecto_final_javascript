<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Parking - Login</title>
    <link rel="stylesheet" href="../ESTILOSCSS/base.css">
    <link rel="stylesheet" href="../ESTILOSCSS/main.css">
</head>
<body class="contenedor1">
    <form id="formulario-login">
        <!-- Parte Superior: visual -->
        <div class="seccion-oscura">
            <div class="circulo-logo">
                <img src="../IMG/1.carrito.jpg" alt="img" id="img">
            </div>
            <h1>Campus Parking</h1>
            <p>Sistema de Gestión de Parqueadero</p>
        </div>

        <!--inputs -->
        <div class="seccion-blanca">
            <div class="grupo-input">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="admin@campusparking.com">
            </div>
            <div class="grupo-input">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="contraseña">
            </div>
            <div class="box-visible">
                <input type="checkbox" id="visible">
                <label for="visible">mostrar contraseña</label>
            </div>
            <button type="submit" id="submit">iniciar sesion</button>
            <p id="mensaje-error">Usuario o contraseña incorrectos</p>
        </div>
    </form>

    <script src="../FUNCIONESJS/main.js"></script>
    <script src="../FUNCIONESJS/usuario.js"></script>
</body>
</html>
