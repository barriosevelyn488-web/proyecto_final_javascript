<dialog id="modal-perfil" class="perfil-dialog-nativo">
    <div class="modal-header">
        <div class="header-titulo-agrupador">
            <h2><i class="fas fa-user"></i> Mi Perfil</h2>
        </div>
        <button type="button" class="cerrar-modal-x">&times;</button>
    </div>

    <form id="formulario-perfil" class="modal-formulario">
        
        <div class="modal-cuerpo-scroll">
            <div class="form-grupo">
                <label for="perfil-nombre">Nombre</label>
                <input type="text" id="perfil-nombre" value="Administrador">
            </div>
            
            <div class="form-grupo">
                <label for="perfil-email">Email</label>
                <input type="email" id="perfil-email" value="admin@campus12.com">
            </div>

            <p class="cambiar-pass-opcional">Cambiar Contraseña (opcional)</p>

            <div class="form-grupo">
                <label for="perfil-pass-actual">Contraseña Actual</label>
                <input type="password" id="perfil-pass-actual">
            </div>

            <div class="form-grupo">
                <label for="perfil-pass-nueva">Nueva Contraseña</label>
                <input type="password" id="perfil-pass-nueva">
            </div>

            <div class="form-grupo">
                <label for="perfil-pass-confirmar">Confirmar Nueva Contraseña</label>
                <input type="password" id="perfil-pass-confirmar">
            </div>
        </div>

        <div class="modal-acciones-pie">
            <button type="button" id="btn-cancelar-perfil" class="btn-secundario">Cancelar</button>
            <button type="submit" class="btn-primario">Guardar Cambios</button>
        </div>
    </form>
</dialog>
